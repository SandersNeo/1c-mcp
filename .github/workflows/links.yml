name: Check Links

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1' # каждый понедельник в 08:00 UTC

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --timeout 30
            --max-retries 3
            --exclude-path .github
            --exclude 'img.shields.io'
            --exclude 'api.star-history.com'
            '**/*.md'
          fail: true

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: lychee/out.md

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
